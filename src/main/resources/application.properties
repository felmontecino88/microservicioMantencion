spring.application.name=mantencion

server.port=8089

# Configuración de Conexión a Neon DB (Ajusta con tus credenciales)
spring.datasource.url=${NEON_DB_URL}
spring.datasource.username=${NEON_DB_USER}
spring.datasource.password=${NEON_DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# Estrategia JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true